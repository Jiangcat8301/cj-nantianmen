<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型管理 - 南天门</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="i18n.js"></script>
</head>
<body class="bg-gray-900 text-gray-100">
  <div class="flex h-screen">
    <div class="w-56 bg-gray-800 border-r border-gray-700 flex flex-col">
      <div class="p-4 border-b border-gray-700"><h1 class="text-lg font-bold text-emerald-400">南天门</h1><p class="text-xs text-gray-500">Nantianmen</p></div>
      <nav class="flex-1 py-2">
        <a href="index.html" class="flex items-center px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-700/50" data-i18n="dashboard">📊 dashboard</a>
        <a href="providers.html" class="flex items-center px-4 py-2.5 text-sm bg-emerald-500/10 text-emerald-400 border-r-2 border-emerald-500" data-i18n="models">🔌 models</a>
        <a href="apikeys.html" class="flex items-center px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-700/50" data-i18n="users">🔑 users</a>
        <a href="stats.html" class="flex items-center px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-700/50" data-i18n="stats">📈 stats</a>
        <a href="api-docs.html" class="flex items-center px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-700/50" data-i18n="docs">📖 docs</a>
      </nav>
      <div class="p-3 border-t border-gray-700 text-xs text-gray-600 flex items-center justify-between">
        <span><span data-i18n="server">Server</span>: <span class="text-emerald-400" data-i18n="online">Online</span></span>
        <select id="lang-select" onchange="applyLang(this.value)" class="bg-gray-900 text-gray-400 text-xs rounded border border-gray-700 px-1 py-0.5">
          <option value="zh">中文</option>
          <option value="en">EN</option>
          <option value="ja">日本語</option>
        </select>
      </div>
    </div>
    <div class="flex-1 overflow-auto p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold" data-i18n="models">模型管理</h2>
        <button onclick="openModal('add-provider-modal')" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-lg text-sm font-medium" data-i18n="add_provider">+ 新增 Provider</button>
      </div>
      <div class="space-y-3">
        <!-- Provider 1 -->
        <div class="bg-gray-800 rounded-lg border border-gray-700">
          <div class="flex items-center justify-between p-4">
            <div class="flex items-center gap-4">
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
              <div><span class="font-medium">OpenAI</span><span class="ml-2 text-xs text-gray-500">openai · https://api.openai.com/v1</span></div>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs text-emerald-400" data-i18n="default_badge">★ 默认</span>: gpt-4o</span>
              <button class="px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 rounded" data-i18n="health">Health</button>
              <button class="px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 rounded" data-i18n="edit">编辑</button>
              <button class="px-3 py-1 text-xs bg-red-900 hover:bg-red-800 rounded" data-i18n="delete">删除</button>
            </div>
          </div>
          <div class="border-t border-gray-700 p-4">
            <div class="space-y-1">
              <div class="flex items-center justify-between py-1.5 px-3 bg-gray-750 rounded text-sm"><span>gpt-4o</span><span class="text-xs text-emerald-400" data-i18n="default_badge">★ 默认</span></div>
              <div class="flex items-center justify-between py-1.5 px-3 bg-gray-750 rounded text-sm"><span>gpt-4o-mini</span><button class="text-xs text-gray-500 hover:text-emerald-400" data-i18n="set_default">设为默认</button></div>
              <div class="flex items-center justify-between py-1.5 px-3 bg-gray-750 rounded text-sm"><span>gpt-4-turbo</span><button class="text-xs text-gray-500 hover:text-emerald-400" data-i18n="set_default">设为默认</button></div>
            </div>
          </div>
        </div>
        <!-- Provider 2 -->
        <div class="bg-gray-800 rounded-lg border border-gray-700">
          <div class="flex items-center justify-between p-4">
            <div class="flex items-center gap-4">
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
              <div><span class="font-medium">Anthropic</span><span class="ml-2 text-xs text-gray-500">anthropic · https://api.anthropic.com</span></div>
            </div>
            <div class="flex items-center gap-2">
              <button class="px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 rounded" data-i18n="health">Health</button>
              <button class="px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 rounded" data-i18n="edit">编辑</button>
              <button class="px-3 py-1 text-xs bg-red-900 hover:bg-red-800 rounded" data-i18n="delete">删除</button>
            </div>
          </div>
        </div>
        <!-- Provider 3 -->
        <div class="bg-gray-800 rounded-lg border border-gray-700">
          <div class="flex items-center justify-between p-4">
            <div class="flex items-center gap-4">
              <span class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
              <div><span class="font-medium">火山引擎 ARK</span><span class="ml-2 text-xs text-gray-500">openai · https://ark.cn-beijing.volces.com/api/v3</span></div>
            </div>
            <div class="flex items-center gap-2">
              <button class="px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 rounded" data-i18n="health">Health</button>
              <button class="px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 rounded" data-i18n="edit">编辑</button>
              <button class="px-3 py-1 text-xs bg-red-900 hover:bg-red-800 rounded" data-i18n="delete">删除</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Provider Modal -->
  <div id="add-provider-modal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-50" onclick="if(event.target===this)closeModal('add-provider-modal')">
    <div class="bg-gray-800 rounded-lg p-6 w-96 border border-gray-700">
      <h3 class="text-lg font-bold mb-4" data-i18n="modal_add_provider">新增 Provider</h3>
      <div class="space-y-3">
        <div>
          <label class="text-xs text-gray-500 mb-1 block" data-i18n="fld_name">名称</label>
          <input class="w-full px-3 py-2 bg-gray-900 rounded border border-gray-700 text-sm" placeholder="OpenAI / Anthropic / ..." />
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block" data-i18n="fld_protocol">协议</label>
          <select class="w-full px-3 py-2 bg-gray-900 rounded border border-gray-700 text-sm">
            <option value="openai">openai</option>
            <option value="anthropic">anthropic</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block" data-i18n="fld_base_url">API Base URL</label>
          <input class="w-full px-3 py-2 bg-gray-900 rounded border border-gray-700 text-sm" placeholder="https://api.openai.com/v1" />
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block" data-i18n="fld_api_key">API Key</label>
          <input type="password" class="w-full px-3 py-2 bg-gray-900 rounded border border-gray-700 text-sm" placeholder="sk-..." />
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button onclick="closeModal('add-provider-modal')" class="px-4 py-2 text-sm bg-gray-700 hover:bg-gray-600 rounded" data-i18n="btn_cancel">取消</button>
        <button onclick="closeModal('add-provider-modal')" class="px-4 py-2 text-sm bg-emerald-600 hover:bg-emerald-700 rounded" data-i18n="btn_confirm">确认</button>
      </div>
    </div>
  </div>
</body>
</html>
