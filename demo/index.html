<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南天门 Nantianmen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="i18n.js"></script>
</head>
<body class="bg-gray-900 text-gray-100">
  <div class="flex h-screen">
    <div class="w-56 bg-gray-800 border-r border-gray-700 flex flex-col">
      <div class="p-4 border-b border-gray-700"><h1 class="text-lg font-bold text-emerald-400">南天门</h1><p class="text-xs text-gray-500">Nantianmen</p></div>
      <nav class="flex-1 py-2">
        <a href="index.html" class="flex items-center px-4 py-2.5 text-sm bg-emerald-500/10 text-emerald-400 border-r-2 border-emerald-500" data-i18n="dashboard">📊 dashboard</a>
        <a href="providers.html" class="flex items-center px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-700/50" data-i18n="models">🔌 models</a>
        <a href="apikeys.html" class="flex items-center px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-700/50" data-i18n="users">🔑 users</a>
        <a href="stats.html" class="flex items-center px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-700/50" data-i18n="stats">📈 stats</a>
        <a href="api-docs.html" class="flex items-center px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-700/50" data-i18n="docs">📖 docs</a>
      </nav>
      <div class="p-3 border-t border-gray-700 text-xs text-gray-600 flex items-center justify-between">
        <span><span data-i18n="server">Server</span>: <span class="text-emerald-400" data-i18n="online">Online</span></span>
        <select id="lang-select" onchange="applyLang(this.value)" class="bg-gray-900 text-gray-400 text-xs rounded border border-gray-700 px-1 py-0.5">
          <option value="zh">中文</option>
          <option value="en">EN</option>
          <option value="ja">日本語</option>
        </select>
      </div>
    </div>
    <div class="flex-1 overflow-auto p-6">
      <h2 class="text-xl font-bold mb-6" data-i18n="dashboard">概览</h2>
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-gray-800 rounded-lg p-5 border border-gray-700"><p class="text-xs text-gray-500 mb-2" data-i18n="provider_count">Provider 数量</p><p class="text-3xl font-bold text-emerald-400">3</p></div>
        <div class="bg-gray-800 rounded-lg p-5 border border-gray-700"><p class="text-xs text-gray-500 mb-2" data-i18n="apikey_count">API Key 数量</p><p class="text-3xl font-bold text-emerald-400">5</p></div>
        <div class="bg-gray-800 rounded-lg p-5 border border-gray-700"><p class="text-xs text-gray-500 mb-2" data-i18n="today_requests">今日请求</p><p class="text-3xl font-bold text-emerald-400">1,247</p></div>
      </div>
      <div class="bg-gray-800 rounded-lg p-5 border border-gray-700">
        <h3 class="text-sm font-semibold text-gray-400 mb-3" data-i18n="recent_activity">最近活动</h3>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-gray-300">OpenAI · gpt-4o</span><span class="text-gray-600">2 min ago</span></div>
          <div class="flex justify-between"><span class="text-gray-300">Anthropic · claude-3-5-sonnet</span><span class="text-gray-600">5 min ago</span></div>
          <div class="flex justify-between"><span class="text-gray-300">火山引擎 · deepseek-v3</span><span class="text-gray-600">12 min ago</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
